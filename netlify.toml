[build]
command = "corepack enable && pnpm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "20"
PNPM_VERSION = "10.14.0"

[functions]
node_bundler = "esbuild"
external_node_modules = ["pg", "pg-native", "pg-cloudflare", "pdfkit", "canvas"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
