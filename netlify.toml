[build]
command = "pnpm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

[functions]
external_node_modules = ["express", "pg", "bcryptjs", "tesseract.js", "pdfkit", "exceljs"]
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
