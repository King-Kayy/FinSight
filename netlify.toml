[build]
command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "20"
PNPM_VERSION = "10.14.0"

[functions]
node_bundler = "esbuild"
esbuild_target = "node20"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
